<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Recherche Fiche</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments :: header}"></div>

    <div class="container">
        <div class="row">
            <div class="col-lg-2">
                <label>Departement: </label>
            </div>
            <div class="col-lg-4">
                <select name="department" id="department" class="form-select">
                    <optiion value="">-- Choisir un département --</optiion>
                    <option th:each="dept : ${allDepts}" th:value="${dept.code}" th:text="${dept.code + ' - ' + dept.libelle}">
                    </option>
                </select>
            </div>
            <div class="col-lg-2">
                <label>Commune</label>
            </div>
            <div class="col-lg-4">
                <select name="commune" id="commune" class="form-select">
                    <option value="">-- Choisir une commune --</option>
                    <option th:each="com : ${allComs}" th:value="${com.code}" th:text="${com.code + ' - ' + com.libelle}">
                    </option>
                </select>
            </div>
        </div>

        <!--  Accordions  -->
        <div class="accordion accordion-flush" id="accordionFlushExample">
            <div class="accordion-item">
                <h2 class="accordion-header" id="flush-headingOne">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#flush-collapseOne" aria-expanded="false" aria-controls="flush-collapseOne">
                        Recherche Par Bien
                    </button>
                </h2>
                <div id="flush-collapseOne" class="accordion-collapse collapse" aria-labelledby="flush-headingOne" data-bs-parent="#accordionFlushExample">
                    <div class="accordion-body">
                        <div class="row">
                            <div class="col-lg-4">
                                <label>Prefixe</label>
                                <input type="text" value="" class="form-control" />
                            </div>
                            <div class="col-lg-4">
                                <label>Section</label>
                                <input type="text" value="" class="form-control" />
                            </div>
                            <div class="col-lg-4">
                                <label>Numero de Plan</label>
                                <input type="text" value="" class="form-control" />
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="accordion-item">
                <h2 class="accordion-header" id="flush-headingTwo">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#flush-collapseTwo" aria-expanded="false" aria-controls="flush-collapseTwo">
                        Recherche Par Personne
                    </button>
                </h2>
                <div id="flush-collapseTwo" class="accordion-collapse collapse" aria-labelledby="flush-headingTwo" data-bs-parent="#accordionFlushExample">
                    <div class="accordion-body">
                        <fieldset>
                            <legend>Personne Physique</legend>
                            <div class="row">
                                <div class="col-lg-4">
                                    <input type="text" placeholder="SPI" class="form-control" >
                                </div>
                                <div class="col-lg-4">
                                    <input type="text" placeholder="Nom" class="form-control" >
                                </div>
                                <div class="col-lg-4">
                                    <input type="text" placeholder="Prenom" class="form-control" >
                                </div>
                            </div>
                        </fieldset>

                        <fieldset>
                            <legend>Personne Morale</legend>
                            <div class="row">
                                <div class="col-lg-6">
                                    <input type="text" placeholder="SIREN" class="form-control" >
                                </div>
                                <div class="col-lg-6">
                                    <input type="text" placeholder="Denomination" class="form-control" >
                                </div>

                            </div>
                        </fieldset>
                    </div>
                </div>
            </div>
            <div class="accordion-item">
                <h2 class="accordion-header" id="flush-headingThree">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#flush-collapseThree" aria-expanded="false" aria-controls="flush-collapseThree">
                        Recherche Par Autorisation  Urbanisme
                    </button>
                </h2>
                <div id="flush-collapseThree" class="accordion-collapse collapse" aria-labelledby="flush-headingThree" data-bs-parent="#accordionFlushExample">
                    <div class="accordion-body">
                        <div class="row justify-content-center align-items-center">
                            <input  type="text" placeholder="PC" class="col-lg-1" />:
                            <input  type="text" placeholder="092" class="col-lg-1"  />:
                            <input  type="text" placeholder="com" class="col-lg-1"  />:
                            <input  type="text" placeholder="annee" class="col-lg-1"  />:
                            <input  type="text" placeholder="#Au" class="col-lg-1" />
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!--    -->
        <div class="row justify-content-center align-items-center">
            <div class="col-lg-2">
                <button type="button" class="btn btn-primary btn-lg" onclick="window.location.href='/consultation'">Rechercher</button>
            </div>
            <div class="col-lg-4">
                <button type="button" class="btn btn-dark btn-lg" onclick="window.location.href='/consultation'">Effacer</button>
            </div>
        </div>

    </div>




    <div th:replace="~{fragments :: footer}"></div>

    <script>
        function rechercherFiche(){
            console.log('clicked on rechercher fiche');
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
